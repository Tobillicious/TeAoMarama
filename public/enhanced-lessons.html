<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Lessons - Te Ao Marama</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 1.2rem; color: #94a3b8; }
        
        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        
        .lesson-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            border-radius: 1rem; 
            padding: 2rem; 
            transition: all 0.3s ease; 
            cursor: pointer; 
        }
        
        .lesson-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.2); 
            border-color: #10b981; 
        }
        
        .lesson-title { font-size: 1.3rem; margin-bottom: 1rem; color: #10b981; }
        .lesson-meta { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.8rem; font-weight: 600; }
        .subject-badge { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .year-badge { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .cultural-badge { background: linear-gradient(135deg, #10b981, #059669); }
        
        .lesson-description { color: #cbd5e1; line-height: 1.6; margin-bottom: 1.5rem; }
        .view-lesson-btn { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 0.5rem; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s; 
            text-decoration: none;
            display: inline-block;
        }
        .view-lesson-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        
        .stats { display: flex; justify-content: center; gap: 2rem; margin: 3rem 0; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #10b981; }
        .stat-label { color: #94a3b8; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Enhanced Cultural Lessons</h1>
            <p>Beautiful, culturally-authentic teaching resources ready for your classroom</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">9.5</div>
                <div class="stat-label">Cultural Authenticity Score</div>
            </div>
            <div class="stat">
                <div class="stat-number">9.0</div>
                <div class="stat-label">Pedagogical Depth</div>
            </div>
            <div class="stat">
                <div class="stat-number">14.5</div>
                <div class="stat-label">Overall Quality Score</div>
            </div>
        </div>

        <div class="lessons-grid" id="lessons">
            <!-- Lessons will be loaded here -->
        </div>
    </div>

    <script>
        const enhancedLessons = [
            {
                id: 'lesson-1755685119253-e8icfpjsm',
                title: 'Kaitiakitanga in Action: Guardians of the Mangakōtukutuku Stream',
                titleMaori: 'Te Mahi Kaitiaki mō Te Awa o Mangakōtukutuku',
                subject: 'English',
                yearLevel: 'Year 9',
                description: 'Students explore kaitiakitanga through the lens of Te Awa o Mangakōtukutuku, a significant waterway in Ngāti Kahungunu rohe. Includes persuasive speech writing and multimedia campaigns.',
                culturalElements: 'Ngāti Kahungunu perspectives, Mangakōtukutuku Stream restoration'
            },
            {
                id: 'lesson-1755685139259-mbnil3g9n',
                title: 'Te Reo Māori: Indigenous Knowledge Systems',
                subject: 'Te Reo Māori',
                yearLevel: 'Year 9',
                description: 'Deep exploration of indigenous knowledge systems through Te Reo Māori, connecting traditional wisdom with modern learning.',
                culturalElements: 'Traditional knowledge, cultural practices'
            },
            {
                id: 'lesson-1755685159264-u6f0dtih8',
                title: 'English: Indigenous Knowledge Systems',
                subject: 'English', 
                yearLevel: 'Year 8',
                description: 'English language learning through indigenous perspectives and traditional knowledge frameworks.',
                culturalElements: 'Traditional knowledge integration'
            },
            {
                id: 'lesson-1755685179290-w5p0mkfca',
                title: 'Social Studies: Sustainable Solutions',
                subject: 'Social Studies',
                yearLevel: 'Year 7',
                description: 'Exploring sustainable solutions through cultural rights and community responsibilities framework.',
                culturalElements: 'Community responsibilities, sustainable practices'
            },
            {
                id: 'lesson-1755685199315-8heo9gwyo',
                title: 'Mathematics: Understanding Cultural Context',
                subject: 'Mathematics',
                yearLevel: 'Year 7',
                description: 'Mathematics learning enhanced with cultural context and traditional knowledge integration.',
                culturalElements: 'Cultural mathematical concepts, traditional practices'
            }
        ];

        function loadLessons() {
            const lessonsContainer = document.getElementById('lessons');
            
            enhancedLessons.forEach(lesson => {
                const lessonCard = document.createElement('div');
                lessonCard.className = 'lesson-card';
                lessonCard.onclick = () => viewLesson(lesson.id);
                
                lessonCard.innerHTML = `
                    <div class="lesson-title">${lesson.title}</div>
                    ${lesson.titleMaori ? `<div class="lesson-title" style="font-size: 1.1rem; color: #f59e0b; margin-top: -0.5rem; margin-bottom: 1rem;">${lesson.titleMaori}</div>` : ''}
                    <div class="lesson-meta">
                        <span class="badge subject-badge">${lesson.subject}</span>
                        <span class="badge year-badge">${lesson.yearLevel}</span>
                        <span class="badge cultural-badge">Culturally Enhanced</span>
                    </div>
                    <div class="lesson-description">${lesson.description}</div>
                    <div style="margin-bottom: 1rem; color: #10b981; font-size: 0.9rem;">
                        <strong>Cultural Elements:</strong> ${lesson.culturalElements}
                    </div>
                    <a href="#" class="view-lesson-btn" onclick="viewLesson('${lesson.id}'); return false;">
                        View Enhanced Lesson →
                    </a>
                `;
                
                lessonsContainer.appendChild(lessonCard);
            });
        }

        function viewLesson(lessonId) {
            // Navigate to the actual content viewer
            window.location.href = `/#/lesson/${lessonId}`;
        }

        // Load lessons when page loads
        loadLessons();
    </script>
</body>
</html>
