      .App {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        contain: layout style paint;
      }

      /* Optimize for content-visibility */
      .content-visibility-auto {
        content-visibility: auto;
        contain-intrinsic-size: 0 500px;
      }

      /* Reduce layout shifts */
      img,
      video,
      canvas,
      audio,
      iframe,
      embed,
      object {

        max-width: 100%;
      }

      /* Optimize for Core Web Vitals */
      .lcp-optimized {
        contain: layout style paint;
        will-change: transform;
      }

      /* Font display optimization */
      @font-face {
        font-family: 'System Font';
        src: local('Arial'), local('Helvetica'), local('sans-serif');

      }

      /* Critical button styles */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.375rem;
        font-weight: 500;
        transition: all 0.2s ease-in-out;
        cursor: pointer;
        border: none;
        outline: none;
        text-decoration: none;
      }

      .btn:focus {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      /* Optimize for mobile performance */
      @media (max-width: 768px) {
        body {
          font-size: 14px;
        }

        .text-lg {
          font-size: 1rem;
        }
      }

      /* Reduce motion for accessibility */
      @media (prefers-reduced-motion: reduce) {
        .animate-spin {
          animation: none;
        }

        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

          });
          observer.observe({ entryTypes: ['largest-contentful-paint', 'first-input'] });
        } catch (e) {
          console.warn('Performance monitoring failed:', e);
        }
      }

        top: 0;

        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, var(--color-pounamu), var(--color-primary));

        transform: translateX(-100%);

    <script>
      // Show loading indicator
      const loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.style.transform = 'translateX(0)';

        // Hide after page load
        window.addEventListener('load', () => {
          setTimeout(() => {
            loadingIndicator.style.transform = 'translateX(100%)';
          }, 500);
        });
