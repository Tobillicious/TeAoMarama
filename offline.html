<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Te Kura o TeAoMarama</title>
    <style>
      :root {
        --color-pounamu: #059669;
        --color-kowhai: #ca8a04;
        --color-neutral-50: #f9fafb;
        --color-neutral-800: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, var(--color-pounamu) 0%, var(--color-kowhai) 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .container {
        max-width: 500px;
        padding: 2rem;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: 600;
      }

      p {
        font-size: 1.125rem;
        line-height: 1.6;
        margin-bottom: 2rem;
        opacity: 0.9;
      }

      .retry-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .retry-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.5);
      }

      .cultural-message {
        margin-top: 2rem;
        font-style: italic;
        opacity: 0.8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🌐</div>
      <h1>Kāore he hononga ipurangi</h1>
      <p>
        You're currently offline, but don't worry! Many of our educational resources 
        are cached and available for offline viewing.
      </p>
      <button class="retry-btn" onclick="location.reload()">
        Ngana Anō / Try Again
      </button>
      <div class="cultural-message">
        "He waka eke noa" - We are all in this together<br>
        Your learning journey continues even offline
      </div>
    </div>

    <script>
      // Check for network connectivity
      function checkOnlineStatus() {
        if (navigator.onLine) {
          location.reload();
        }
      }

      // Listen for network status changes
      window.addEventListener('online', checkOnlineStatus);

      // Periodic connectivity check
      setInterval(checkOnlineStatus, 30000);

      // Visual feedback for retry attempts
      document.querySelector('.retry-btn').addEventListener('click', function(e) {
        this.textContent = 'Checking connection...';
        this.disabled = true;
        
        setTimeout(() => {
          if (!navigator.onLine) {
            this.textContent = 'Ngana Anō / Try Again';
            this.disabled = false;
          }
        }, 2000);
      });
    </script>
  </body>
</html>
